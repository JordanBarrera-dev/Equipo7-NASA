<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">
  
 <nav class="navbar navbar-dark bg-dark mb-4 custom-nav">
  <div class="container justify-content-center">
    <a class="navbar-brand" href="#">Nasa APOD</a>
  </div>
</nav>

  <main class="container d-flex flex-column align-items-center flex-grow-1">
    
    <div class="mb-4 w-100" style="max-width: 600px;">
      <label class="form-label text-white">Selecciona una fecha:</label>
      <input type="date" class="form-control" id="fecha-nasa" />
    </div>

    <div class="card nasa-card" id="img-dia" style="width: 100%; max-width: 600px;">
      </div>

  </main>

    <footer class="footer-nasa">
      <div class="container">
        <p class="footer-line">
          <i class="fas fa-satellite-dish"></i> API proporcionada por NASA
        </p>
        <p class="footer-line">
          <i class="far fa-image"></i> Astronomy Picture of the Day
        </p>
        <p class="footer-copy">
          <i class="fas fa-users"></i> Equipo 7: Jordan Barrera, Jurany Rodriguez, Enith Vargas
        </p>
      </div>
    </footer>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
